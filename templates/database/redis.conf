# Security Skill — Redis Security Configuration Template
# Merge with your redis.conf

# === AUTHENTICATION ===
# Always require a strong password in production
requirepass YourVeryStrongPasswordHere_ChangeThis

# === NETWORK — Bind to localhost only ===
# 🔴 NEVER: bind 0.0.0.0 (exposes Redis to the internet)
# 🟢 Bind to localhost or internal network only
bind 127.0.0.1

# === TLS (Redis 6+) ===
# Uncomment to enable TLS
# port 0           # disable plain port
# tls-port 6380
# tls-cert-file /etc/redis/tls/redis.crt
# tls-key-file /etc/redis/tls/redis.key
# tls-ca-cert-file /etc/redis/tls/ca.crt

# === DISABLE DANGEROUS COMMANDS ===
# Rename dangerous commands (empty string = disabled)
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command DEBUG ""
rename-command SLAVEOF ""
rename-command REPLICAOF ""
# rename-command KEYS ""  # Uncomment if you don't use KEYS (use SCAN instead)

# === MEMORY ===
# Prevent OOM (Out Of Memory) from consuming all server RAM
maxmemory 256mb
maxmemory-policy allkeys-lru

# === PERSISTENCE ===
# If Redis is used only as cache (not persistent store):
# save ""          # disable RDB snapshots
# appendonly no    # disable AOF

# If using as session store (some persistence needed):
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec

# === PROTECTED MODE ===
# Enabled by default in Redis 3.2+ — keep it on
protected-mode yes

# === LOGGING ===
loglevel notice
logfile /var/log/redis/redis-server.log

# === TIMEOUTS ===
# Disconnect idle clients after 300 seconds
timeout 300
tcp-keepalive 60
