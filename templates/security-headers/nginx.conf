# Security Skill — Nginx Security Configuration Template
# Merge with your existing nginx.conf

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # === TLS CONFIGURATION ===
    ssl_certificate /etc/ssl/certs/yourdomain.com.crt;
    ssl_certificate_key /etc/ssl/private/yourdomain.com.key;

    # Strong TLS: only TLS 1.2 and 1.3
    ssl_protocols TLSv1.2 TLSv1.3;

    # Perfect Forward Secrecy cipher suite
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
    ssl_prefer_server_ciphers on;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;

    # DH params for DHE ciphers (generate: openssl dhparam -out /etc/ssl/dhparam.pem 4096)
    ssl_dhparam /etc/ssl/dhparam.pem;

    # TLS session cache
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;  # Disable for PFS

    # === SECURITY HEADERS ===
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; frame-ancestors 'none'; base-uri 'self';" always;

    # Remove server version fingerprint
    server_tokens off;

    # === RATE LIMITING ===
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    location /api/ {
        limit_req zone=api burst=10 nodelay;
        limit_conn conn_per_ip 20;
        proxy_pass http://localhost:3000;
    }

    location /api/auth/ {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://localhost:3000;
    }

    # === TIMEOUT / SLOWLORIS PROTECTION ===
    client_header_timeout 10s;
    client_body_timeout 10s;
    send_timeout 10s;
    keepalive_timeout 65s;
    client_max_body_size 10M;

    # === HIDE SENSITIVE PATHS ===
    location ~ /\. {
        deny all;  # Block access to hidden files (.env, .git, etc.)
        return 404;
    }

    location ~ \.(env|key|pem|bak|backup|sql|log)$ {
        deny all;
        return 404;
    }

    # === DISABLE DIRECTORY LISTING ===
    autoindex off;

    # === GZIP ===
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 256;
}

# === HTTP → HTTPS REDIRECT ===
server {
    listen 80;
    server_name yourdomain.com;
    return 301 https://$host$request_uri;
}
